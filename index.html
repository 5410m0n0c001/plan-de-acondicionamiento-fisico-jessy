<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Integral Jessica Sandoval | Rehabilitación Física</title>
    <meta name="description" content="Plan Integral de Nutrición y Entrenamiento - Rehabilitación Física y Mejora de Salud">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="main-header">
            <div class="header-content">
                <span class="subtitle">Plan Integral Mes 1 · Nutriología Deportiva</span>
                <h1><span class="accent">Programa de</span> <span class="gold">Rehabilitación Física</span></h1>
                <p class="user-info"><b>Jessica Sandoval</b> · 40 años · 52 kg · IMC 22.5 · Anemia leve en corrección</p>
                
                <div class="stats-grid">
                    <div class="stat-card accent-bg">
                        <span class="label">Kcal/día</span>
                        <span class="value">~1,700</span>
                    </div>
                    <div class="stat-card gold-bg">
                        <span class="label">Proteína</span>
                        <span class="value">65–75g</span>
                    </div>
                    <div class="stat-card red-bg">
                        <span class="label">Hierro/día</span>
                        <span class="value">Máximo</span>
                    </div>
                    <div class="stat-card purple-bg">
                        <span class="label">Agua</span>
                        <span class="value">1.8–2L</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="main-nav">
            <div class="nav-container">
                <button class="nav-btn active" data-tab="rutina">🏋️ Rutinas</button>
                <button class="nav-btn" data-tab="nutricion">🥗 Nutrición</button>
                <button class="nav-btn" data-tab="progresion">📈 Progresión</button>
                <button class="nav-btn" data-tab="medico">🩺 Notas Médicas</button>
            </div>
        </nav>

        <!-- Dynamic Content -->
        <main id="content" class="content-area">
            <!-- Content will be injected here via script.js -->
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
